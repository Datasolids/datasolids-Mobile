name: datasolids_mobile
description: "Datasolids — patient-controlled health data, on your phone."
publish_to: "none"
# Bumped per release tag. iOS build number = `1` segment.
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

# ────────────────────────────────────────────────────────────────────────────
# Runtime dependencies
# ────────────────────────────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + DI
#  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Routing
#  go_router: ^14.2.7

  # HTTP + typed API
  dio: ^5.7.0
  retrofit: ^4.4.1
  pretty_dio_logger: ^1.4.0

  # Models + code generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.2     # tokens (Keychain / EncryptedSharedPrefs)
  shared_preferences: ^2.3.2          # non-sensitive prefs
  drift: ^2.20.2                      # SQLite-backed local cache
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Auth / device
  local_auth: ^2.3.0                  # Face ID / Touch ID / fingerprint
  jwt_decoder: ^2.0.1

  # Forms / validation
  reactive_forms: ^17.0.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_native_splash: ^2.4.1
  country_code_picker: ^3.0.0
  image_picker: ^1.1.2

  # Notifications + deep links
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  app_links: ^6.3.2

  # Crash reporting + logging
  sentry_flutter: ^8.9.0
  logger: ^2.4.0

  # Network state
  connectivity_plus: ^6.0.5

  # i18n + date utils
  intl: ^0.20.0
  timeago: ^3.7.0

  # Functional plumbing
  fpdart: ^1.1.0                       # Either<L,R> for explicit error returns
  equatable: ^2.0.5

  # Env (compile-time via --dart-define is preferred; this is the runtime fallback)
  flutter_dotenv: ^5.1.0

  # OAuth callback handler (for SMART-on-FHIR mobile flow when needed)
  flutter_web_auth_2: ^4.1.0

  # External URL launching — used by the diagnostic-report detail screen
  # to open presigned S3 file URLs for PDF/HTML/PNG attachments.
  url_launcher: ^6.3.0

# ────────────────────────────────────────────────────────────────────────────
# Dev dependencies — code generation, testing, linting
# ────────────────────────────────────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Codegen
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.5
  riverpod_generator: ^2.4.3
  drift_dev: ^2.20.2

  # Linting (strict but ergonomic — same ruleset used by Very Good Ventures)
  very_good_analysis: ^6.0.0

  # Testing
  mocktail: ^1.0.4
  patrol: ^3.13.0                     # better integration-test runner

  # Asset tooling
  flutter_launcher_icons: ^0.14.1
  flutter_gen_runner: ^5.7.0

  # Custom lints (riverpod-aware)
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.3

# ────────────────────────────────────────────────────────────────────────────
# Flutter section
# ────────────────────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true
  generate: true                       # turns on l10n codegen

  assets:
    - assets/images/
    - assets/icons/
    - .env.development
    - .env.staging
    - .env.production

  # Inter font matches the webapp design tokens.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500

# ────────────────────────────────────────────────────────────────────────────
# Launcher icons (run `dart run flutter_launcher_icons` after replacing the PNG)
# ────────────────────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#1A365D"
  adaptive_icon_foreground: assets/icons/app_icon_foreground.png
  min_sdk_android: 23

# ────────────────────────────────────────────────────────────────────────────
# Native splash (run `dart run flutter_native_splash:create`)
# ────────────────────────────────────────────────────────────────────────────
flutter_native_splash:
  color: "#1A365D"
  image: assets/icons/splash.png
  android_12:
    color: "#1A365D"
    image: assets/icons/splash_android12.png
